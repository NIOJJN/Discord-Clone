<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Discord Clone{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/discord_style.css' %}">
    
    {% block extra_css %}{% endblock %}
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            background-color: #313338;
            color: #dcddde;
        }
    </style>
</head>
<body>
    {% csrf_token %}
    
    {% block content %}{% endblock %}
    
    <!-- Только jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <script>
    // Глобальные функции
    
    function getCSRFToken() {
        var token = document.querySelector('[name=csrfmiddlewaretoken]');
        return token ? token.value : '';
    }
    
    // Модальные окна
    function openModal(id) {
        var modal = document.getElementById(id);
        if (modal) modal.style.display = 'flex';
    }
    
    function closeModal(id) {
        var modal = document.getElementById(id);
        if (modal) modal.style.display = 'none';
    }
    
    // Закрытие по клику вне модального окна
    document.addEventListener('click', function(e) {
        if (e.target.classList.contains('modal-overlay')) {
            e.target.style.display = 'none';
        }
    });
    
    // Закрытие по Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            document.querySelectorAll('.modal-overlay').forEach(function(m) {
                m.style.display = 'none';
            });
        }
    });
    
    function sendFriendRequest(userId) {
        fetch('/accounts/friend-request/send/' + userId + '/', {
            method: 'POST',
            headers: { 'X-CSRFToken': getCSRFToken() }
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.success) { location.reload(); }
            else { alert(d.error || 'Ошибка'); }
        });
    }
    
    function acceptFriendRequest(id) {
        fetch('/accounts/friend-request/accept/' + id + '/', {
            method: 'POST',
            headers: { 'X-CSRFToken': getCSRFToken() }
        }).then(function() { location.reload(); });
    }
    
    function declineFriendRequest(id) {
        fetch('/accounts/friend-request/decline/' + id + '/', {
            method: 'POST',
            headers: { 'X-CSRFToken': getCSRFToken() }
        }).then(function() { location.reload(); });
    }
    
    function joinServer() {
        var code = document.getElementById('inviteCode');
        if (code && code.value.trim()) {
            window.location.href = '/servers/join/' + code.value.trim() + '/';
        }
    }
    
    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
